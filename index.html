<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ranking CAOP (Abril-Mayo-Junio)</title>
  <style>
    :root { --b:#e5e7eb; --t:#111827; --m:#6b7280; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin:0; color:var(--t); background:#fff; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 6px; font-size: 28px; }
    p { margin: 0 0 18px; color: var(--m); }
    .grid { display:grid; gap: 12px; }
    label { display:block; font-size: 14px; }
    input, select { width:100%; padding: 10px; margin-top: 6px; border: 1px solid var(--b); border-radius: 10px; font-size: 15px; }
    button { padding: 12px; border-radius: 10px; border: 1px solid var(--b); background:#fff; font-weight: 700; cursor:pointer; }
    .box { padding: 12px; border-radius: 10px; border: 1px solid var(--b); }
    .err { border-color: #f0a; }
    .ok  { border-color: #0a0; }
    .big { font-size: 22px; font-weight: 700; }
    .muted { color: var(--m); font-size: 13px; margin-top: 6px; }
    .note { margin-top: 18px; font-size: 12px; color: var(--m); line-height: 1.35; }
    code { background:#f3f4f6; padding:2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Ranking CAOP (Abril-Mayo-Junio)</h1>
    <p>Ingresá los datos del torneo para calcular tus puntos (TOP 40).</p>

    <div class="grid">
      <label>
        Cantidad de entradas (Q Ent)
        <input id="qEnt" inputmode="numeric" placeholder="Ej: 120" />
      </label>

      <label>
        Posición final (Pos) — solo TOP 40
        <select id="pos"></select>
      </label>

      <label>
        Tipo de evento
        <select id="evento"></select>
      </label>

      <button id="btn">Calcular Puntos</button>

      <div id="msg" class="box" style="display:none;"></div>

      <div id="res" class="box ok" style="display:none;">
        <div style="font-weight:700; margin-bottom:6px;">Resultado</div>
        <div id="resVal" class="big">0.00 puntos</div>
        <div id="resMeta" class="muted"></div>
      </div>

      <div class="note">
        Fórmula:<br/>
        <code>
          Puntos = 10 × ( √Entradas / √Pos ) × ( 1 + log10(Tipo de evento) + 0.25 ) × √(Tipo de evento/100000)
        </code><br/>
        Si la posición es mayor a 40, el resultado es 0.
      </div>
    </div>
  </main>

  <script>
    // Montos internos actualizados (ARS)
    const EVENTOS = [
      { key: "FINAL_HAND", label: "FINAL HAND", monto: 225000 },
      { key: "CHAMPIONS",  label: "CHAMPIONS",  monto: 105000 },
      { key: "LEGACY",     label: "LEGACY",     monto: 60000  },
      { key: "GOLDEN",     label: "GOLDEN",     monto: 72000  },
      { key: "VICTORY",    label: "VICTORY",    monto: 22000  },
      { key: "STAGE",      label: "STAGE",      monto: 11000  },
    ];

    const qEntEl = document.getElementById("qEnt");
    const posSel = document.getElementById("pos");
    const eventoSel = document.getElementById("evento");
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");
    const res = document.getElementById("res");
    const resVal = document.getElementById("resVal");
    const resMeta = document.getElementById("resMeta");

    // Cargar posiciones 1..40
    for (let i = 1; i <= 40; i++) {
      const opt = document.createElement("option");
      opt.value = String(i);
      opt.textContent = String(i);
      posSel.appendChild(opt);
    }
    posSel.value = "1";

    // Cargar eventos (solo nombres visibles)
    EVENTOS.forEach(ev => {
      const opt = document.createElement("option");
      opt.value = ev.key;
      opt.textContent = ev.label;
      eventoSel.appendChild(opt);
    });
    eventoSel.value = "FINAL_HAND";

    function showError(text){
      msg.style.display = "block";
      msg.className = "box err";
      msg.textContent = text;
      res.style.display = "none";
    }
    function hideError(){
      msg.style.display = "none";
      msg.textContent = "";
    }

    function log10(x){
      return Math.log10 ? Math.log10(x) : (Math.log(x) / Math.log(10));
    }

    btn.addEventListener("click", () => {
      hideError();

      const entradas = Number(String(qEntEl.value).replace(",", "."));
      const pos = Number(posSel.value);

      if (!Number.isFinite(entradas) || entradas <= 0) {
        return showError("Ingresá una cantidad de entradas válida (> 0).");
      }

      if (!Number.isFinite(pos) || pos <= 0) {
        return showError("Seleccioná una posición válida.");
      }

      if (pos > 40) {
        resVal.textContent = `0.00 puntos`;
        resMeta.textContent = `Posición > 40 (sin puntos).`;
        res.style.display = "block";
        return;
      }

      const ev = EVENTOS.find(e => e.key === eventoSel.value);
      const tipoEvento = ev ? ev.monto : 0;

      if (!Number.isFinite(tipoEvento) || tipoEvento <= 0) {
        return showError("Tipo de evento inválido.");
      }

      const parte1 = Math.sqrt(entradas) / Math.sqrt(pos);
      const parte2 = (1 + log10(tipoEvento) + 0.25);
      const parte3 = Math.sqrt(tipoEvento / 100000);

      const puntos = 10 * parte1 * parte2 * parte3;
      const safe = Math.max(0, puntos);

      resVal.textContent = `${safe.toFixed(2)} puntos`;
      resMeta.textContent = `Evento: ${ev.label} — Pos: ${pos} — Entradas: ${entradas}`;
      res.style.display = "block";
    });
  </script>
</body>
</html>
